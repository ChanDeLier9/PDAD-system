spring.application.name=PDAD-system
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/itcast?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=your-username
spring.datasource.password=your-password

mybatis.configuration.map-underscore-to-camel-case=true
server.port=8080

spring.web.resources.static-locations=classpath:/static/

mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml

ml.base-url=http://127.0.0.1:18000
ml.connect-timeout=3000
ml.read-timeout=150000